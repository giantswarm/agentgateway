# Managed in https://github.com/giantswarm/github/tree/main/repositories/override/agentgateway/.pre-commit-config.yaml
#
# Override of the devctl-generated config: the upstream chart files vendored
# via vendir under helm/agentgateway/charts/ lack trailing newlines, and the
# auto-fixing base hooks would modify them on every vendir bump (and vendir
# sync reverts the fix). Exclude the vendored subtree from those hooks.
# See https://github.com/giantswarm/agentgateway/issues/12
minimum_pre_commit_version: '2.17'
default_install_hook_types: [pre-commit, commit-msg]
repos:
  # base hooks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-merge-conflict
      - id: check-shebang-scripts-are-executable
      - id: detect-private-key
      - id: end-of-file-fixer
        exclude: "(.*testdata/.*|^\\.yarn/.*|^helm/agentgateway/charts/.*)"
      - id: mixed-line-ending
        exclude: "^helm/agentgateway/charts/.*"
      - id: trailing-whitespace
        exclude: "(.*testdata/.*|^\\.yarn/.*|^helm/agentgateway/charts/.*)"

  - repo: https://github.com/compilerla/conventional-pre-commit
    rev: v4.4.0
    hooks:
      - id: conventional-pre-commit
        stages: [commit-msg]
        args: [--strict]

  # Helm chart hooks for agentgateway
  - repo: https://github.com/losisin/helm-values-schema-json
    rev: v2.5.0
    hooks:
      - id: helm-schema
        args:
          - --config
          - helm/agentgateway/.schema.yaml
  - repo: https://github.com/giantswarm/schemalint
    rev: v2.6.1
    hooks:
      - id: schemalint-normalize
        args:
          - helm/agentgateway/values.schema.json
          - -o
          - helm/agentgateway/values.schema.json
          - --force
      - id: schemalint-verify
        args:
          - helm/agentgateway/values.schema.json
  - repo: https://github.com/norwoodj/helm-docs
    rev: "v1.14.2"
    hooks:
      - id: helm-docs
        args:
          - --chart-search-root=helm
          - --sort-values-order=file
